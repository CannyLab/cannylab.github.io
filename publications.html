<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <title>Publications - CannyLab @ UC Berkeley</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0">

  <link href="/assets/base.css" media="screen" rel="stylesheet" type="text/css" />
  <link href="/assets/extra.css" media="screen" rel="stylesheet" type="text/css" />
  <link rel="shortcut icon" href="/assets/public/favicon.ico" />
  <style>
    .menu-item-name a {
      pointer-events: auto !important;
      cursor: pointer !important;
      color: #50a9ca !important;
      text-decoration: none !important;
    }
    .menu-item-name a:hover {
      text-decoration: underline !important;
    }
    
    /* Dark theme support */
    body.dark-theme {
      background-color: #1a1a1a !important;
      color: #e0e0e0 !important;
    }
    
    body.dark-theme .profile-name h1 {
      color: #ffffff !important;
    }
    
    body.dark-theme .profile-description p {
      color: #cccccc !important;
    }
    
    body.dark-theme .menu-item-name {
      color: #ffffff !important;
    }
    
    body.dark-theme .menu-item-name a {
      color: #64b5f6 !important;
    }
    
    body.dark-theme .menu-item-name a:hover {
      color: #90caf9 !important;
    }
    
    body.dark-theme .menu-item-price {
      color: #b0b0b0 !important;
    }
    
    body.dark-theme .menu-item-description {
      color: #a0a0a0 !important;
    }
    
    body.dark-theme .menu-category-name {
      color: #ffffff !important;
    }
    
    body.dark-theme .footer {
      background-color: #2d2d2d !important;
      color: #cccccc !important;
    }
    
    body.dark-theme .copyright {
      color: #a0a0a0 !important;
    }
    
    /* Dark theme for the Google Scholar link */
    body.dark-theme a[href*="scholar.google.com"] {
      color: #64b5f6 !important;
    }
    
    body.dark-theme a[href*="scholar.google.com"]:hover {
      color: #90caf9 !important;
    }
    
    /* System preference fallback */
    @media (prefers-color-scheme: dark) {
      body:not(.light-theme) {
        background-color: #1a1a1a !important;
        color: #e0e0e0 !important;
      }
      
      body:not(.light-theme) .profile-name h1 {
        color: #ffffff !important;
      }
      
      body:not(.light-theme) .profile-description p {
        color: #cccccc !important;
      }
      
      body:not(.light-theme) .menu-item-name {
        color: #ffffff !important;
      }
      
      body:not(.light-theme) .menu-item-name a {
        color: #64b5f6 !important;
      }
      
      body:not(.light-theme) .menu-item-name a:hover {
        color: #90caf9 !important;
      }
      
      body:not(.light-theme) .menu-item-price {
        color: #b0b0b0 !important;
      }
      
      body:not(.light-theme) .menu-item-description {
        color: #a0a0a0 !important;
      }
      
      body:not(.light-theme) .menu-category-name {
        color: #ffffff !important;
      }
      
      body:not(.light-theme) .footer {
        background-color: #2d2d2d !important;
        color: #cccccc !important;
      }
      
      body:not(.light-theme) .copyright {
        color: #a0a0a0 !important;
      }
      
      body:not(.light-theme) a[href*="scholar.google.com"] {
        color: #64b5f6 !important;
      }
      
      body:not(.light-theme) a[href*="scholar.google.com"]:hover {
        color: #90caf9 !important;
      }
    }
  </style>

  <script src="/assets/modernizr.js" type="text/javascript"></script>
</head>

<body>
  <div class="wrapper">
    <div class="profile">
      <section class="profile-masthead" id="masthead">
        <a href="/">
          <header class="profile-logo">
            <div class="profile-logo-image">
              <img alt="CannyLab " src="/images/logo.png" />
            </div>
            <div class="profile-name" style="color:#2d3c48">
              <h1>CannyLab @ UC Berkeley</h1>
            </div>
          </header>
        </a>
        <aside class="profile-summary">
          <div class="summary-location summary-module">
          </div>
        </aside>
        <div>
          <nav class="menu-navigation" style="margin-top: 1em;">
            <ul class="menu-navigation-list" style="text-align: center; width: 100%;">
              <li class="menu-navigation-list-item"><a href="/">Home</a></li>
              <li class="menu-navigation-list-item">|</li>
              <li class="menu-navigation-list-item">Publications</li>
            </ul>
          </nav>
        </div>
      </section>

      <section class="profile-content" id="content">
        <div class="profile-description">
          <p>Recent publications from the CannyLab research group.</p>
        </div>

        <div style="text-align: center; margin: 20px 0;">
          <a href="https://scholar.google.com/citations?hl=en&user=LAv0HTEAAAAJ&view_op=list_works" target="_blank" style="color: #50a9ca; text-decoration: none; font-size: 16px;">Click to view the full list of publications.</a>
        </div>

        <article class="profile-menu" id="menu">
          <div id='papers' class='menu-category'>
            <ol class="menu-category-list">
              <br>
              <div w3-include-html="papers.html"></div>
            </ol>
            <div id='paper_display'></div>
          </div>
        </article>
      </section>
    </div>
  </div>

  <footer class="footer">
    <nav class="footer-navigation">
      <p class="copyright">© 2020 Regents of the University of California. All rights reserved.</p>
    </nav>
  </footer>

  <script src="https://code.jquery.com/jquery-3.5.1.min.js"
    integrity="sha256-9/aliU8dGd2tb6OSsuzixeV4y/faTqgFtohetphbbj0=" crossorigin="anonymous"></script>
  <script>
    function includeHTML() {
      var z, i, elmnt, file, xhttp;
      /* Loop through a collection of all HTML elements: */
      z = document.getElementsByTagName("*");
      for (i = 0; i < z.length; i++) {
        elmnt = z[i];
        /*search for elements with a certain atrribute:*/
        file = elmnt.getAttribute("w3-include-html");
        if (file) {
          /* Make an HTTP request using the attribute value as the file name: */
          xhttp = new XMLHttpRequest();
          xhttp.onreadystatechange = function () {
            if (this.readyState == 4) {
              if (this.status == 200) { elmnt.innerHTML = this.responseText; }
              if (this.status == 404) { elmnt.innerHTML = "Page not found."; }
              /* Remove the attribute, and call this function once more: */
              elmnt.removeAttribute("w3-include-html");
              includeHTML();
            }
          }
          xhttp.open("GET", file, true);
          xhttp.send();
          /* Exit the function: */
          return;
        }
      }
    }

    includeHTML();
  </script>

</body>

</html>
